<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus New-Tab V3.3.1</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html, body {
        height: 100%;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: #fff;
    }
    body {
        background-image: url('https://firefox-settings-attachments.cdn.mozilla.net/main-workspace/newtab-wallpapers-v2/0b039df1-971b-445a-84f6-6a15da08940e.svg');
        background-position: bottom center;
        background-size: cover;
        background-attachment: fixed;
        background-color: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 8vh;
        position: relative;
    }

    /* Погодный виджет */
    .weather-widget {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #fff;
        z-index: 100;
    }
    .weather-widget .temp {
        font-size: 22px;
        font-weight: bold;
    }
    .weather-widget .desc {
        text-transform: capitalize;
    }
    .weather-icon {
        font-size: 28px;
    }

    .outer-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 1200px;
        padding: 0 20px;
    }

    /* Логотип */
    .logo-and-wordmark-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
    }
    .logo-and-wordmark {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .logo-icon {
        width: 36px;
        height: 36px;
        object-fit: contain;
    }
    .logo-text {
        font-size: 26px;
        font-weight: bold;
        color: #ffffff;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        line-height: 1;
    }

    /* Объединённая поисковая секция */
    .unified-search-wrapper {
        width: 100%;
        max-width: 600px;
        margin-bottom: 30px;
        background: linear-gradient(to bottom, black 30%, #2d1538 100%);
        border-radius: 0px;
        /* overflow: hidden;  убрали, чтобы меню не обрезалось */
    }

    /* Верхняя строка (основной поиск + кнопки) */
    .search-box {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 16px;
        background: transparent;
    }
    .search-icon {
        width: 24px;
        height: 24px;
        margin-right: 12px;
        flex-shrink: 0;
    }
    .search-input {
        flex-grow: 1;
        height: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-size: 16px;
        color: #ffffff;
        caret-color: #ffffff;
    }
    .search-input::placeholder {
        color: #cccccc;
        opacity: 1;
    }

    /* Кнопки в правой части поисковой строки */
    .search-actions {
        position: relative;  /* чтобы выпадашка позиционировалась относительно этого блока */
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 12px;
    }
    .url-toggle-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        background: none;
        border: none;
        color: #cccccc;
        cursor: pointer;
        font-size: 14px;
        padding: 4px 8px;
        border-radius: 4px;
        transition: all 0.2s;
    }
    .url-toggle-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }
    .url-toggle-btn.active {
        background: rgba(255, 255, 255, 0.2);
        color: #fff;
    }
    .url-toggle-icon {
        width: 16px;
        height: 16px;
        fill: currentColor;
    }
    .settings-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: #cccccc;
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        transition: all 0.2s;
        position: relative;
    }
    .settings-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }
    .settings-icon {
        width: 20px;
        height: 20px;
        fill: currentColor;
    }

    /* Выпадающее меню настроек (шестерёнки) — окончательный вариант */
    .settings-dropdown {
        display: none;
        position: absolute;
        top: 100%;          /* сразу под кнопкой */
        right: 0;
        background: rgb(69, 69, 69);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        min-width: 160px;
        z-index: 200;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        overflow: hidden;
    }
    .settings-dropdown.open {
        display: block;
    }
    .settings-dropdown button {
        display: block;
        width: 100%;
        padding: 10px 16px;
        text-align: left;
        background: none;
        border: none;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .settings-dropdown button:hover {
        background: rgba(255, 255, 255, 0.15);
    }

    /* Нижняя панель быстрых переходов */
    .quick-jump-box {
        height: 0;
        overflow: hidden;
        transition: height 0.3s ease, padding 0.3s ease;
        background: transparent;
        border-top: 0px solid rgba(255, 255, 255, 0);  /* по умолчанию границы нет */
        display: flex;
        align-items: center;
        padding: 0 16px;
    }
    .quick-jump-box.expanded {
        height: 48px;
        padding: 0 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.15);  /* граница только при раскрытии */
    }
    .quick-jump-input {
        flex-grow: 1;
        height: 100%;
        border: none;
        outline: none;
        background: transparent;
        font-size: 14px;
        color: #ffffff;
        caret-color: #ffffff;
    }
    .quick-jump-input::placeholder {
        color: #888888;
        opacity: 1;
    }

    /* Плитки */
    .top-sites-section {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }
    .top-sites-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        list-style: none;
        padding: 0;
    }
    .top-site-outer {
        list-style: none;
    }
    .top-site-button {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #fff;
        width: 80px;
        padding: 8px 4px;
        border-radius: 8px;
        transition: background 0.2s;
    }
    .top-site-button:hover {
        background: rgba(255, 255, 255, 0.1);
    }
    .tile {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .tile img {
        width: 32px;
        height: 32px;
        object-fit: contain;
    }
    .title-label {
        font-size: 12px;
        text-align: center;
        word-break: break-word;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    /* Кнопка персонализации (старая) */
    .personalize-button {
        position: fixed;
        top: 12px;
        right: 130px;
        background: rgba(0, 0, 0, 0.4);
        border: none;
        border-radius: 4px;
        color: #fff;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .personalize-button:hover {
        background: rgba(0, 0, 0, 0.6);
    }
    .personalize-button img {
        width: 16px;
        height: 16px;
        filter: invert(1);
    }
    .customize-menu {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #2a2a3e;
        color: #fff;
        padding: 20px;
        border-radius: 8px;
        z-index: 1000;
        min-width: 300px;
    }
    .customize-menu.open {
        display: block;
    }
    .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
    }
    .overlay.open {
        display: block;
    }
</style>
</head>
<body>

    <!-- Погодный виджет -->
    <div class="weather-widget" id="weather-widget">
        <span class="weather-icon" id="weather-icon"></span>
        <span class="temp" id="weather-temp">--°</span>
        <span class="desc" id="weather-desc">Загрузка...</span>
    </div>

    <div class="outer-wrapper">
        <!-- Логотип Nexus -->
        <div class="logo-and-wordmark-wrapper">
            <div class="logo-and-wordmark">
                <img class="logo-icon" src="NexusLogoV1.png" alt="Nexus Logo">
                <span class="logo-text">Nexus</span>
            </div>
        </div>

             <!-- Объединённая поисковая секция -->
        <div class="unified-search-wrapper">
            <!-- Верхняя строка (основной поиск + кнопки) -->
            <div class="search-box">
                <img class="search-icon" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI2NjY2NjYyI+PHBhdGggZD0iTTE1LjUgMTRoLS43OWwtLjI4LS4yN0MxNS40MSAxMi41OSAxNiAxMS4xMSAxNiA5LjUgMTYgNS45MSAxMy4wOSAzIDkuNSAzUzMgNS45MSAzIDkuNSA1LjkxIDE2IDkuNSAxNmMxLjYxIDAgMy4wOS0uNTkgNC4yMy0xLjU3bC4yNy4yOHYuNzlsNSA0Ljk5TDIwLjQ5IDE5bC00Ljk5LTV6bS02IDBDNy4wMSAxNCA1IDExLjk5IDUgOS41UzcuMDEgNSA5LjUgNSAxNCA3LjAxIDE0IDkuNSAxMS45OSAxNCA5LjUgMTR6Ii8+PC9zdmc+" alt="Search">
                <input class="search-input" type="text" placeholder="Nexus Search" id="search-input" title="На основе DuckDuckGo">
                <div class="search-actions">
                    <!-- Кнопка включения панели URL -->
                    <button class="url-toggle-btn" id="url-toggle-btn" title="Включить режим поиска по URL">
                        <svg class="url-toggle-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <span>URL</span>
                    </button>
                    <!-- Шестерёнка -->
                    <button class="settings-btn" id="settings-btn" title="Настройки">
                        <svg class="settings-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.38.12-.56l-1.89-3.28c-.12-.19-.36-.26-.56-.18l-2.38.96c-.5-.38-1.06-.68-1.66-.88L14.72 3.3c-.04-.2-.2-.34-.4-.34h-3.78c-.2 0-.36.14-.4.34l-.26 2.38c-.6.2-1.16.5-1.66.88l-2.38-.96c-.2-.08-.44-.01-.56.18l-1.89 3.28c-.12.19-.07.42.12.56l2.03 1.58c-.04.31-.06.63-.06.94 0 .31.02.63.06.94l-2.03 1.58c-.18.14-.23.38-.12.56l1.89 3.28c.12.19.36.26.56.18l2.38-.96c.5.38 1.06.68 1.66.88l.26 2.38c.04.2.2.34.4.34h3.78c.2 0 .36-.14.4-.34l.26-2.38c.6-.2 1.16-.5 1.66-.88l2.38.96c.2.08.44.01.56-.18l1.89-3.28c.12-.19.07-.42-.12-.56l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
                    </button>
                    <!-- Выпадающее меню (вне кнопки) -->
                    <div class="settings-dropdown" id="settings-dropdown">
                        <button>Тест 1</button>
                        <button>Тест 2</button>
                        <button>Тест 3</button>
                    </div>
                </div>
            </div>
            <!-- Нижняя панель (быстрые переходы) -->
            <div class="quick-jump-box" id="quick-jump-box">
                <input class="quick-jump-input" type="text" placeholder="Nexus URL Search" id="quick-jump-input" title="Введи команду или URL">
            </div>
        </div>
        <!-- Плитки -->
        <div class="top-sites-section">
            <ul class="top-sites-list">
                <li class="top-site-outer">
                    <a class="top-site-button" href="https://www.deepseek.com/">
                        <div class="tile">
                            <img src="https://www.deepseek.com/favicon.ico" alt="DeepSeek">
                        </div>
                        <span class="title-label">DeepSeek</span>
                    </a>
                </li>
                <!-- Добавляй свои сайты по шаблону -->
            </ul>
        </div>
    </div>

    <!-- Кнопка персонализации (старая) -->
    <button class="personalize-button" id="personalize-btn">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0id2hpdGUiPjxwYXRoIGQ9Ik0zIDE3LjI1VjIxaDMuNzVMMTcuODEgOS45NGwtMy43NS0zLjc1TDMgMTcuMjV6TTIwLjcxIDcuMDRjLjM5LS4zOS4zOS0xLjAyIDAtMS40MWwtMi4zNC0yLjM0Yy0uMzktLjM5LTEuMDItLjM5LTEuNDEgMGwtMS44MyAxLjgzIDMuNzUgMy43NSAxLjgzLTEuODN6Ii8+PC9zdmc+" alt="">
        Персонализация
    </button>

    <div class="overlay" id="overlay"></div>
    <div class="customize-menu" id="customize-menu">
        <h3>Настройки</h3>
        <p>Здесь можно добавить свои настройки.</p>
        <button id="close-settings-btn">Закрыть</button>
    </div>

    <script>
        // === ПОГОДА ===
        async function fetchWeather() {
            const lat = 52.48766;
            const lon = 32.91671;
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Сетевая ошибка');
                const data = await response.json();
                const weather = data.current_weather;
                document.getElementById('weather-temp').textContent = `${Math.round(weather.temperature)}°C`;
                const code = weather.weathercode;
                const descriptions = {
                    0: 'Ясно', 1: 'Преимущественно ясно', 2: 'Переменная облачность', 3: 'Пасмурно',
                    45: 'Туман', 48: 'Изморозь',
                    51: 'Лёгкая морось', 53: 'Умеренная морось', 55: 'Сильная морось',
                    61: 'Небольшой дождь', 63: 'Умеренный дождь', 65: 'Сильный дождь',
                    71: 'Небольшой снег', 73: 'Умеренный снег', 75: 'Сильный снег',
                    80: 'Ливень', 81: 'Умеренный ливень', 82: 'Сильный ливень',
                    95: 'Гроза', 96: 'Гроза с мелким градом', 99: 'Гроза с крупным градом'
                };
                document.getElementById('weather-desc').textContent = descriptions[code] || 'Неизвестно';
                const emojiMap = {
                    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
                    45: '🌫️', 48: '🌫️',
                    51: '🌦️', 53: '🌦️', 55: '🌧️',
                    61: '🌧️', 63: '🌧️', 65: '🌧️',
                    71: '❄️', 73: '❄️', 75: '❄️',
                    80: '🌦️', 81: '🌧️', 82: '🌧️',
                    95: '⛈️', 96: '⛈️', 99: '⛈️'
                };
                document.getElementById('weather-icon').textContent = emojiMap[code] || '❓';
            } catch (e) {
                document.getElementById('weather-desc').textContent = 'Ошибка загрузки';
                document.getElementById('weather-temp').textContent = '--°';
                document.getElementById('weather-icon').textContent = '⚠️';
                console.error(e);
            }
        }
        fetchWeather();

        // === ПОИСК (основной) ===
        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = encodeURIComponent(this.value.trim());
                if (query) {
                    window.location.href = 'https://duckduckgo.com/?q=' + query;
                }
            }
        });

        // === ПЕРЕКЛЮЧАТЕЛЬ ПАНЕЛИ БЫСТРЫХ ПЕРЕХОДОВ ===
        const urlToggleBtn = document.getElementById('url-toggle-btn');
        const quickJumpBox = document.getElementById('quick-jump-box');
        let urlMode = false;

        urlToggleBtn.addEventListener('click', () => {
            urlMode = !urlMode;
            if (urlMode) {
                quickJumpBox.classList.add('expanded');
                urlToggleBtn.classList.add('active');
            } else {
                quickJumpBox.classList.remove('expanded');
                urlToggleBtn.classList.remove('active');
            }
        });

        // === БЫСТРЫЕ ПЕРЕХОДЫ (нижняя панель) ===
        const quickJumpInput = document.getElementById('quick-jump-input');
        const bangs = {
            'ds': (query) => query ? `https://chat.deepseek.com/?q=${encodeURIComponent(query)}` : 'https://www.deepseek.com',
            'fd': () => 'https://github.com/MrOtherGuy/fx-autoconfig',
            'yt': (query) => query ? `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}` : 'https://www.youtube.com',
            'gh': (query) => query ? `https://github.com/search?q=${encodeURIComponent(query)}` : 'https://github.com',
            'wiki': (query) => query ? `https://ru.wikipedia.org/wiki/${encodeURIComponent(query)}` : 'https://ru.wikipedia.org',
            'rdt': (query) => query ? `https://www.reddit.com/search/?q=${encodeURIComponent(query)}` : 'https://www.reddit.com',
        };

        quickJumpInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const raw = this.value.trim();
                if (!raw) return;
                if (/^(https?:\/\/|www\.|[a-zA-Z0-9-]+\.\w{2,})/.test(raw)) {
                    let url = raw;
                    if (!/^https?:\/\//.test(url)) url = 'https://' + url;
                    window.location.href = url;
                    return;
                }
                const parts = raw.split(/\s+/);
                const command = parts[0].toLowerCase();
                const query = parts.slice(1).join(' ');
                if (bangs[command]) {
                    window.location.href = bangs[command](query);
                    return;
                }
                window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(raw);
            }
        });

        // === ШЕСТЕРЁНКА И ВЫПАДАЮЩЕЕ МЕНЮ ===
        const settingsBtn = document.getElementById('settings-btn');
        const settingsDropdown = document.getElementById('settings-dropdown');

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // чтобы клик не закрыл меню сразу
            settingsDropdown.classList.toggle('open');
        });

        // Закрытие меню при клике вне
        document.addEventListener('click', (e) => {
            if (!settingsBtn.contains(e.target)) {
                settingsDropdown.classList.remove('open');
            }
        });

        // === ПЕРСОНАЛИЗАЦИЯ (старая) ===
        const personalizeBtn = document.getElementById('personalize-btn');
        const customizeMenu = document.getElementById('customize-menu');
        const overlay = document.getElementById('overlay');
        const closeSettingsBtn = document.getElementById('close-settings-btn');

        function openSettings() {
            customizeMenu.classList.add('open');
            overlay.classList.add('open');
        }
        function closeSettings() {
            customizeMenu.classList.remove('open');
            overlay.classList.remove('open');
        }

        personalizeBtn.addEventListener('click', openSettings);
        overlay.addEventListener('click', closeSettings);
        closeSettingsBtn.addEventListener('click', closeSettings);
    </script>
</body>
</html>
